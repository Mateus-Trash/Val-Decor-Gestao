# pnpm 11.x uses allowBuilds
# esbuild: false — skip esbuild's postinstall (it fails with EACCES on shared hosting)
# We fix permissions with our own postinstall script instead
allowBuilds:
  esbuild: false
  "@tailwindcss/oxide": true

# pnpm 10.x compatibility
onlyBuiltDependencies:
  - "@tailwindcss/oxide"

neverBuiltDependencies:
  - esbuild
